<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rewear | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <nav>
      <a class="logo" href="index.html">Rewear<span>.</span></a>
      <div class="links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="messages.html">Messages</a>
        <a href="pledge.html">Pledge</a>
        <a class="active" href="contact.html">Contact</a>
      </div>
    </nav>

    <main>
      <section class="panel">
        <h1>Contact</h1>
        <p>Want to host a swap event or partner with Rewear? Reach out below.</p>
      </section>

      <section class="panel form-wrap">
        <form id="contactForm">
          <label>
            Full Name
            <input type="text" name="name" required />
          </label>
          <label>
            Email
            <input type="email" name="email" required />
          </label>
          <label>
            Message
            <textarea name="message" rows="5" required></textarea>
          </label>
          <button type="submit">Send Message</button>
        </form>
        <p id="contactSuccess" aria-live="polite"></p>
      </section>
    </main>

    <footer>(c) 2026 Rewear Revolution</footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
